version: 2
project_name: slack-acp

builds:
  - main: ./cmd/slack-acp/
    binary: slack-acp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
    ignore:
      - goos: darwin
        goarch: arm   # no darwin/arm (32-bit); darwin/arm64 is Apple Silicon

archives:
  - formats: [binary]
    name_template: "slack-acp-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256
  extra_files:
    - glob: LICENSE
    - glob: THIRD_PARTY_NOTICES.md

release:
  github:
    owner: kfet
    name: slack-acp
  prerelease: auto
  name_template: "slack-acp {{.Version}}"
  extra_files:
    - glob: LICENSE
    - glob: THIRD_PARTY_NOTICES.md

# ---------------------------------------------------------------------------
# Homebrew tap
#
# GoReleaser regenerates Formula/slack-acp.rb on kfet/homebrew-fir on
# every release (reusing fir's tap so users don't need a second tap).
#
# Users install with:
#   brew install kfet/fir/slack-acp
# ---------------------------------------------------------------------------
brews:
  - name: slack-acp
    repository:
      owner: kfet
      name: homebrew-fir
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    url_template: "https://github.com/kfet/slack-acp/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/kfet/slack-acp"
    description: "Slack bot that relays each thread to a spawned ACP-speaking agent"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "slack-acp: update to {{ .Tag }}"
    skip_upload: auto
    test: |
      system "#{bin}/slack-acp", "--version"
    # The downloaded artifact is named slack-acp-<os>-<arch> (archives.formats=binary
    # emits raw binaries, not tarballs), so `bin.install "slack-acp"` fails
    # with ENOENT. Glob the staged artifact and rename it on install.
    install: |
      bin.install Dir["slack-acp-*"].first => "slack-acp"

changelog:
  use: github-native
